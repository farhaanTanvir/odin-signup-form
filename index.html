<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.cdnfonts.com/css/norse" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Odin Signup Form</title>

</head>
<body>
    <section id="page">

        <div class="logo">
            <div class="label">
                <img src="images/odin-lined-logo.png" alt="odin_logo"><p>ODIN</p>
            </div>
        </div>

        <div class="form">
            <div class="heading"><p>This is not a real online service! You know you need something in your life to help you realize your deepest dreams. Sign up <i>now</i> to get started.</p> <br> <p>You <i>know</i> you want to.</p></div>

            <div class="form-inputs">
                 <p>Let's Do This!</p>

                 <form>
                    <div class="input-container">
                        <div class="form-group">
  <label for="first-name">First Name</label>
  <input type="text" id="first-name" name="first-name">
</div>

<div class="form-group">
  <label for="email">Email</label>
  <input type="email" id="email" name="email">
</div>

<div class="form-group">
  <label for="password">Password</label>
  <input type="password" id="password" name="password">
</div>

<div class="form-group">
  <label for="last-name">Last Name</label>
  <input type="text" id="last-name" name="last-name">
</div>

<div class="form-group">
  <label for="phone">Phone Number</label>
  <input type="tel" id="phone" name="phone">
</div>

<div class="form-group">
  <label for="confirm-password">Confirm Password</label>
  <input type="password" id="confirm-password" name="confirm-password">
</div>
                    </div>
                    <button type="submit">Create Account</button>
                 </form>
            </div>

            <div class="btns"></div>
        </div>
    </section>
</body>
</html>
